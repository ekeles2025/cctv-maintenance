{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="stat-card">
            <h3 class="text-center">{{ _('إضافة فني جديد') }}</h3>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">{{ _('اسم المستخدم') }}</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">{{ _('كلمة المرور') }}</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">{{ _('إضافة فني') }}</button>
                    <a href="{{ url_for('technicians') }}" class="btn btn-secondary">{{ _('إلغاء') }}</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
