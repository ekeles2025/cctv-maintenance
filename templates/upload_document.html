{% extends "base.html" %}

{% block title %}{{ _('رفع المستندات')}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary">
            <i class="fas fa-file-upload me-2"></i>{{ _('رفع المستندات')}
        </h1>
        <a href="{{ url_for('dashboard')}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-right me-1"></i>{{ _('العودة للرئيسية')}
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="stat-card">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="fas fa-file-alt me-2"></i>{{ _('رفع مستند جديد')}
                    </h5>
                    
                    <form method="POST" action="{{ url_for('upload_document')}">
                        <div class="mb-3">
                            <label for="branch_id" class="form-label">{{ _('اختر الفرع')} *</label>
                            <select class="form-select" id="branch_id" name="branch_id" required>
                                <option value="">{{ _('اختر الفرع...')}</option>
                                {% for chain in chains %}
                                    <optgroup label="{{ chain.name }}">
                                        {% for region in chain.regions %}
                                            {% for branch in region.branches %}
                                                <option value="{{ branch.id }}">{{ branch.name }}</option>
                                            {% endfor %}
                                        {% endfor %}
                                    </optgroup>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="technician_name" class="form-label">{{ _('اسم الفني')}</label>
                            <input type="text" class="form-control" id="technician_name" name="technician_name" 
                                   value="{{ current_user.username }}" placeholder="{{ _('أدخل اسم الفني')}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="notes" class="form-label">{{ _('ملاحظات')}</label>
                            <textarea class="form-control" id="notes" name="notes" rows="4" 
                                      placeholder="{{ _('أدخل أي ملاحظات إضافية')}"></textarea>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>{{ _('ملاحظة هامة:')}</strong>
                            {{ _('عند رفع مستند لـ NVR، سيتم تسجيل عطل تلقائي لجميع كاميرات الفرع')}
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-upload me-2"></i>{{ _('رفع المستند')}
                            </button>
                            <a href="{{ url_for('dashboard')}" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times me-2"></i>{{ _('إلغاء')}
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.form-select {
    border-radius: 8px;
    border: 1px solid #ddd;
    padding: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
}

.form-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 0.2rem rgba(54, 96, 146, 0.25);
}

.alert-info {
    background: linear-gradient(135deg, rgba(23, 162, 184, 0.1) 0%, rgba(23, 162, 184, 0.05) 100%);
    border: 1px solid rgba(23, 162, 184, 0.3);
    border-radius: 12px;
}

.card-body {
    padding: 2rem;
}

.btn-lg {
    padding: 12px 24px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.btn-lg:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}
</style>
{% endblock %}
