{% extends "base.html" %}

{% block title %}{{ _('تعديل العطل') }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4">
                    <i class="fas fa-edit text-primary me-2"></i>
                    {{ _('تعديل بيانات العطل') }} #{{ fault.id }}
                </h2>
                <a href="{{ url_for('all_faults') }}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-right me-1"></i>
                    {{ _('العودة للأعطال') }}
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <form method="POST" id="editFaultForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('نوع العطل') }} <span class="text-danger">*</span></label>
                                    <select class="form-select" name="fault_type" required>
                                        <option value="كهرباء" {% if fault.fault_type == 'كهرباء' %}selected{% endif %}>{{ _('كهرباء') }}</option>
                                        <option value="شبكة" {% if fault.fault_type == 'شبكة' %}selected{% endif %}>{{ _('شبكة') }}</option>
                                        <option value="جهاز" {% if fault.fault_type == 'جهاز' %}selected{% endif %}>{{ _('جهاز') }}</option>
                                        <option value="برمجيات" {% if fault.fault_type == 'برمجيات' %}selected{% endif %}>{{ _('برمجيات') }}</option>
                                        <option value="كابل" {% if fault.fault_type == 'كابل' %}selected{% endif %}>{{ _('كابل') }}</option>
                                        <option value="محروق" {% if fault.fault_type == 'محروق' %}selected{% endif %}>{{ _('محروق') }}</option>
                                        <option value="أخرى" {% if fault.fault_type == 'أخرى' %}selected{% endif %}>{{ _('أخرى') }}</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('نوع الجهاز') }} <span class="text-danger">*</span></label>
                                    <select class="form-select" name="device_type" required>
                                        <option value="NVR" {% if fault.device_type == 'NVR' %}selected{% endif %}>NVR</option>
                                        <option value="Switch" {% if fault.device_type == 'Switch' %}selected{% endif %}>Switch</option>
                                        <option value="Router" {% if fault.device_type == 'Router' %}selected{% endif %}>Router</option>
                                        <option value="Up Link" {% if fault.device_type == 'Up Link' %}selected{% endif %}>Up Link</option>
                                        <option value="Camera" {% if fault.device_type == 'Camera' %}selected{% endif %}>{{ _('كاميرا') }}</option>
                                        <option value="محروق" {% if fault.device_type == 'محروق' %}selected{% endif %}>محروق</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('الوصف') }} <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="description" rows="4" required>{{ fault.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('المبلغ') }} <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="reported_by" value="{{ fault.reported_by }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('الفني المسؤول') }}</label>
                                    <select class="form-select" name="technician_id">
                                        <option value="">{{ _('لم يتم التعيين') }}</option>
                                        {% for technician in technicians %}
                                        <option value="{{ technician.id }}" {% if fault.technician_id == technician.id %}selected{% endif %}>{{ technician.username }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('ملاحظات الإصلاح') }}</label>
                            <textarea class="form-control" name="repair_notes" rows="3" placeholder="{{ _('اكتب أي ملاحظات إضافية هنا...') }}">{{ fault.repair_notes or '' }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('تاريخ الإبلاغ') }}</label>
                                    <input type="text" class="form-control" value="{{ fault.date_reported|local_dt('%Y-%m-%d %H:%M') }}" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">{{ _('الحالة الحالية') }}</label>
                                    <input type="text" class="form-control" value="{% if fault.resolved_at %}{{ _('مُصلح') }}{% else %}{{ _('قيد الإصلاح') }}{% endif %}" readonly>
                                </div>
                            </div>
                        </div>

                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('all_faults') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i>
                                {{ _('إلغاء') }}
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>
                                {{ _('حفظ التعديلات') }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('editFaultForm');
    
    form.addEventListener('submit', function(e) {
        const description = document.querySelector('textarea[name="description"]').value.trim();
        const reportedBy = document.querySelector('input[name="reported_by"]').value.trim();
        
        if (!description) {
            e.preventDefault();
            alert('{{ _("الرجاء إدخال وصف العطل") }}');
            return false;
        }
        
        if (!reportedBy) {
            e.preventDefault();
            alert('{{ _("الرجاء إدخال اسم المبلغ") }}');
            return false;
        }
        
        // Show loading
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>{{ _("جاري الحفظ...") }}';
    });
});
</script>
{% endblock %}
